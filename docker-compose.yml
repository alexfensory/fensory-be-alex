version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: verba-postgres
    environment:
      POSTGRES_USER: verba
      POSTGRES_PASSWORD: verba_secret
      POSTGRES_DB: verba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verba -d verba"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: verba-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verba-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://verba:verba_secret@postgres:5432/verba
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Background Workers
  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: verba-workers
    environment:
      - DATABASE_URL=postgresql://verba:verba_secret@postgres:5432/verba
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
